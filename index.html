<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="QuietSpace — For the people the world got wrong.">
<title>QuietSpace — Gilbert Simba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #171210;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.25);
    --warm-gray: #7a6f62;
    --bg: #1c1712;
    --bg-card-border: #332c22;
    --bg-card: #252019;
    --text-primary: #e8e0d0;
    --text-secondary: #a8998a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .page-wrapper {
    display: flex;
    max-width: 600px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  .about-link {
    position: absolute;
    top: 1.25rem;
    right: 1.5rem;
    font-family: 'Karla', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #ffffff !important;
    text-decoration: none !important;
    border: 1px solid #1a8a72;
    border-left: 4px solid #1a8a72;
    background: rgba(26,138,114,0.15);
    padding: 0.4rem 0.85rem;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.2s ease;
  }

  .about-link:visited,
  .about-link:active,
  .about-link:link {
    color: #ffffff !important;
    text-decoration: none !important;
  }

  .about-link:hover {
    background: rgba(26,138,114,0.28);
    box-shadow: 0 0 15px rgba(201,168,76,0.35), inset 0 0 10px rgba(201,168,76,0.08);
  }

  .page-spine {
    width: 16px;
    flex-shrink: 0;
    border-radius: 4px 0 0 4px;
    background: linear-gradient(to bottom, #c9a84c, #f0d080);
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-left: none;
    border-top: 3px solid rgba(201,168,76,0.3);
    border-bottom: 3px solid rgba(201,168,76,0.3);
    position: relative;
    padding: 6rem 3.5rem 6rem;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.08);
    pointer-events: none;
  }

  /* MARK */
  .mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.2s;
  }

  /* TITLE */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.4s;
  }

  .title em { font-style: italic; color: var(--gold); }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold-dim);
    margin: 1.5rem auto;
  }

  /* GILBERT VOICE */
  .voice {
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
    margin-bottom: 1.5rem;
  }

  .voice p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.05rem, 2.5vw, 1.2rem);
    font-weight: 300;
    font-style: normal;
    line-height: 1.9;
    color: var(--text-secondary);
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .voice p em {
    font-style: italic;
    color: var(--gold);
  }

  .sig {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.5s;
  }

  /* BUTTON */
  .btn-wrap {
    margin-top: 2rem;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.8s;
  }

  .btn-enter {
    display: inline-block;
    font-family: 'Karla', sans-serif;
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    white-space: nowrap;
    text-transform: uppercase;
    color: #ffffff;
    text-decoration: none;
    border: 1px solid #1a8a72;
    border-left: 4px solid #1a8a72;
    border-bottom: 4px solid var(--gold);
    background: rgba(26,138,114,0.15);
    padding: 0.75rem 3rem;
    transition: background 0.3s ease;
  }

  .btn-enter:hover { background: rgba(26,138,114,0.28); box-shadow: 0 0 20px rgba(201,168,76,0.4), inset 0 0 15px rgba(201,168,76,0.1); }

  /* COPYRIGHT */
  .copyright {
    margin-top: auto;
    padding-top: 2rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(201,168,76,0.85);
    opacity: 0;
    animation: fadeUp 1s ease forwards 2s;
    align-self: flex-start;
    text-align: left;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .share-row {
    text-align: center;
    margin-top: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 2.2s;
  }

  .share-label {
    font-family: 'Karla', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 0.75rem;
  }

  .share-buttons {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .share-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'Karla', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-decoration: none;
    border: 1px solid var(--bg-card-border);
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    background: none;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .share-btn.whatsapp { color: #25d366; border-color: rgba(37,211,102,0.3); }
  .share-btn.whatsapp:hover { border-color: #25d366; }
  .share-btn.twitter { color: var(--text-secondary); border-color: var(--bg-card-border); }
  .share-btn.twitter:hover { color: var(--text-primary); border-color: var(--text-secondary); }
  .share-btn.copy { color: var(--gold); border-color: var(--gold-dim); }
  .share-btn.copy:hover { border-color: var(--gold); }

</style>
</head>
<body>

<div class="page-wrapper">
<div class="page-spine"></div>
<div class="page">
  <a href="about.html" class="about-link">About</a>
  <p class="mark">QuietSpace</p>

  <h1 class="title">For the people<br>who the world <em>got wrong.</em></h1>

  <div class="divider"></div>

  <div class="voice">
    <p>You were told you were wrong. You made room for others and forgot yourself. I am not here to judge you. <em>I know that road.</em></p>
  </div>

  <div class="btn-wrap">
    <a href="doors.html" class="btn-enter">Welcome. Come Inside.</a>
  </div>
  <p class="copyright">© Gilbert Simba — QuietSpace · Gold Edition</p>
  <div style="position:absolute;bottom:1.5rem;right:0.75rem;text-align:center;">
    <svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 28 C8 28 4 22 4 16 L4 6 L24 6 L24 16 C24 22 20 28 14 28Z" fill="none" stroke="#c9a84c" stroke-width="1.5" opacity="0.7"/>
      <path d="M4 8 L1 8 C1 8 1 16 6 18" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
      <path d="M24 8 L27 8 C27 8 27 16 22 18" fill="none" stroke="#c9a84c" stroke-width="1.2" opacity="0.5"/>
      <rect x="10" y="28" width="8" height="3" fill="#c9a84c" opacity="0.5" rx="1"/>
      <rect x="7" y="31" width="14" height="2" fill="#c9a84c" opacity="0.6" rx="1"/>
      <circle cx="14" cy="17" r="3" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.6"/>
      <path d="M14 14 L15 16.5 L14 18 L13 16.5Z" fill="#c9a84c" opacity="0.5"/>
    </svg>
    <p style="font-family:'Karla',sans-serif;font-size:0.5rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(201,168,76,0.5);margin-top:0.3rem;">Gold Edition</p>
  </div>
</div>
</div>

<canvas id="qs-particles" style="position:fixed;inset:0;pointer-events:none;z-index:0;"></canvas>

<script>
  // Particles
  const canvas = document.getElementById('qs-particles');
  const ctx = canvas.getContext('2d');
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  const particles = Array.from({length: 50}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2 + 0.5,
    speedY: -(Math.random() * 0.35 + 0.1),
    speedX: (Math.random() - 0.5) * 0.15,
    opacity: Math.random() * 0.5 + 0.1,
    twinkle: Math.random() * Math.PI * 2
  }));
  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.twinkle += 0.018;
      p.y += p.speedY;
      p.x += p.speedX;
      if (p.y < -5) { p.y = canvas.height + 5; p.x = Math.random() * canvas.width; }
      const alpha = p.opacity * (0.7 + 0.3 * Math.sin(p.twinkle));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawParticles);
  }
  drawParticles();

  const faviconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <rect width="32" height="32" fill="#1a1612"/>
    <rect x="10" y="6" width="12" height="20" rx="1" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="14" y="14" width="4" height="6" rx="0.5" fill="#c9a84c" opacity="0.6"/>
    <circle cx="16" cy="17" r="1" fill="#c9a84c"/>
  </svg>`;
  const faviconBlob = new Blob([faviconSVG], { type: 'image/svg+xml' });
  const faviconUrl = URL.createObjectURL(faviconBlob);
  const faviconLink = document.createElement('link');
  faviconLink.rel = 'icon';
  faviconLink.href = faviconUrl;
  document.head.appendChild(faviconLink);
</script>
</body>
</html>
