<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="QuietSpace — For the people the world got wrong.">
<title>QuietSpace — Gilbert Simba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #171210;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.25);
    --warm-gray: #7a6f62;
    --bg: #1c1712;
    --bg-card-border: #332c22;
    --bg-card: #252019;
    --text-primary: #e8e0d0;
    --text-secondary: #a8998a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Karla', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 6rem 2rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  .page-wrapper {
    display: flex;
    max-width: 600px;
    width: 100%;
  }

  .about-link {
    position: absolute;
    top: 1.25rem;
    right: 1.5rem;
    font-family: 'Karla', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #ffffff !important;
    text-decoration: none !important;
    -webkit-tap-highlight-color: transparent;
  }

  .about-link:visited,
  .about-link:active,
  .about-link:link {
    color: #ffffff !important;
    text-decoration: none !important;
  }

  .page-spine {
    width: 22px;
    flex-shrink: 0;
    border-radius: 4px 0 0 4px;
    background: linear-gradient(to bottom, #073d30, #1a8a72);
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--bg-card-border);
    border-left: none;
    border-top: 3px solid rgba(201,168,76,0.3);
    border-bottom: 3px solid rgba(201,168,76,0.3);
    position: relative;
    padding: 5rem 3rem 4rem;
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.08);
    pointer-events: none;
  }

  /* MARK */
  .mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.2s;
  }

  /* TITLE */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 9vw, 5.5rem);
    font-weight: 300;
    line-height: 1.05;
    color: var(--text-primary);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.4s;
  }

  .title em { font-style: italic; color: var(--gold); }

  /* DIVIDER */
  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold-dim);
    margin: 1.5rem auto;
  }

  /* GILBERT VOICE */
  .voice {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    margin-bottom: 3.5rem;
  }

  .voice p {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.35rem, 3vw, 1.6rem);
    font-weight: 300;
    font-style: normal;
    line-height: 1.6;
    color: var(--text-secondary);
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .voice p em {
    font-style: italic;
    color: var(--gold);
  }

  .sig {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.5s;
  }

  /* BUTTON */
  .btn-wrap {
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 1.8s;
  }

  .btn-enter {
    display: inline-block;
    font-family: 'Karla', sans-serif;
    font-size: 0.75rem;
    font-weight: 400;
    letter-spacing: 0.2em;
    white-space: nowrap;
    text-transform: uppercase;
    color: #ffffff;
    text-decoration: none;
    border: 1px solid var(--gold);
    padding: 1rem 5rem;
    position: relative;
    overflow: hidden;
    transition: color 0.4s ease;
  }

  .btn-enter::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gold);
    transform: translateX(-101%);
    transition: transform 0.4s ease;
    z-index: -1;
  }

  .btn-enter:hover { color: var(--ink); }
  .btn-enter:hover::before { transform: translateX(0); }

  /* COPYRIGHT */
  .copyright {
    margin-top: 2.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: rgba(201,168,76,0.85);
    opacity: 0;
    animation: fadeUp 1s ease forwards 2s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="page-wrapper">
<div class="page-spine"></div>
<div class="page">
  <a href="about.html" class="about-link">About</a>
  <p class="mark">QuietSpace</p>

  <h1 class="title">For the people<br>the world <em>got wrong.</em></h1>

  <div class="divider"></div>

  <div class="voice">
    <p>You were told you were wrong. You made room for others and forgot yourself. I am not here to judge you. <em>I know that road.</em></p>
  </div>

  <div class="btn-wrap">
    <a href="doors.html" class="btn-enter">Come In. It's safe.</a>
  </div>

  <p style="font-family:'Cormorant Garamond',serif;font-size:0.85rem;letter-spacing:0.15em;color:var(--text-secondary);margin-bottom:0.75rem;">This space listens. It was built to.</p>
  <p class="copyright">© Gilbert Simba — QuietSpace</p>
</div>
</div>

<script>
  const faviconSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
    <rect width="32" height="32" fill="#1a1612"/>
    <rect x="10" y="6" width="12" height="20" rx="1" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="14" y="14" width="4" height="6" rx="0.5" fill="#c9a84c" opacity="0.6"/>
    <circle cx="16" cy="17" r="1" fill="#c9a84c"/>
  </svg>`;
  const faviconBlob = new Blob([faviconSVG], { type: 'image/svg+xml' });
  const faviconUrl = URL.createObjectURL(faviconBlob);
  const faviconLink = document.createElement('link');
  faviconLink.rel = 'icon';
  faviconLink.href = faviconUrl;
  document.head.appendChild(faviconLink);
</script>
</body>
</html>
